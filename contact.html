<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberGuard | Контакты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <div class="container nav-content">
        <div class="logo">Cyber<span>Guard</span></div>
        <ul class="nav-links">
            <li><a href="index.html">О проекте</a></li>
            <li><a href="contact.html" class="active">Контакты</a></li>
        </ul>
    </div>
</nav>

<main class="container page-content">
    <section class="contact-info">
        <h1>Свяжитесь с нами</h1>
        <p>Есть вопросы по безопасности? Мы готовы помочь 24/7.</p>
        <ul>
            <li><strong>Адрес:</strong> г. Москва, ул. Цифровая, д. 101, офис 404</li>
            <li><strong>Телефон:</strong> +7 (900) 123-45-67</li>
            <li><strong>Email:</strong> secure@cyberguard.tech</li>
        </ul>
    </section>

    <section class="form-section">
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label for="message">Текст сообщения</label>
                <textarea id="message" rows="5" placeholder="Опишите вашу задачу..."></textarea>
            </div>
            <button type="submit" class="btn">Отправить запрос</button>
        </form>

        <div id="formResponse" style="margin-top: 20px;"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 CyberGuard Solutions. Все права защищены.</p>
</footer>
    <script src="index.js"></script>
</body>
</html>
